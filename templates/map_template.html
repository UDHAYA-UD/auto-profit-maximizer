<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AutoProfit AI Map</title>
    
    <!-- Leaflet.js CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
          integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
          crossorigin="">
          
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background-color: #0e0e12;
        }
        
        #map {
            width: 100%;
            height: 100%;
        }
        
        /* ── Map Legend ── */
        .map-legend {
            position: absolute;
            bottom: 24px;
            right: 24px;
            z-index: 1000;
            background: rgba(28, 28, 36, 0.9);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 199, 0, 0.2);
            border-radius: 12px;
            padding: 14px 18px;
            color: #f8f8fa;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
            pointer-events: auto;
        }
        
        .legend-title {
            font-size: 0.72rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            margin: 0 0 10px 0;
            color: #a0a0b2;
        }
        
        .legend-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.8rem;
            font-weight: 600;
            margin-bottom: 6px;
        }
        
        .legend-item:last-child {
            margin-bottom: 0;
        }
        
        .legend-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            display: inline-block;
        }
        
        /* ── Popup Styling ── */
        .leaflet-popup-content-wrapper {
            background: rgba(22, 22, 28, 0.95) !important;
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 199, 0, 0.25);
            border-radius: 12px !important;
            color: #f8f8fa !important;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5) !important;
        }
        
        .leaflet-popup-tip {
            background: rgba(22, 22, 28, 0.95) !important;
            border: 1px solid rgba(255, 199, 0, 0.25);
        }
        
        .popup-header {
            border-bottom: 1px solid rgba(255, 199, 0, 0.15);
            padding-bottom: 8px;
            margin-bottom: 8px;
        }
        
        .popup-title {
            font-weight: 800;
            font-size: 0.95rem;
            margin: 0;
            color: #FFC700;
        }
        
        .popup-subtitle {
            font-size: 0.7rem;
            color: #a0a0b2;
            margin: 2px 0 0 0;
        }
        
        .popup-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 6px;
            font-size: 0.78rem;
        }
        
        .popup-row:last-child {
            margin-bottom: 0;
        }
        
        .popup-label {
            color: #a0a0b2;
        }
        
        .popup-value {
            font-weight: 700;
            color: #f8f8fa;
        }
        
        .badge-demand {
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 0.65rem;
            font-weight: 800;
            text-transform: uppercase;
        }
        
        .badge-demand.high { background: rgba(0, 255, 136, 0.15); color: #00ff88; }
        .badge-demand.medium { background: rgba(255, 170, 0, 0.15); color: #ffaa00; }
        .badge-demand.low { background: rgba(255, 68, 68, 0.15); color: #ff4444; }

        /* ============================================================
           CUSTOM AUTO-RICKSHAW MAP MARKERS — 3D perspective floating toy
           ============================================================ */
        .auto-div-marker {
            background: transparent;
            border: none;
            perspective: 300px;
        }
        
        .auto-marker-badge {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 48px;
            height: 48px;
            background: transparent;
            border: none;
            border-radius: 0;
            cursor: pointer;
            transform-style: preserve-3d;
            transform: rotateX(20deg) translateY(-10px);
            transform-origin: bottom center;
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            animation: bobFloat 2.4s infinite ease-in-out;
        }
        
        .auto-marker-badge img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            filter: drop-shadow(0 4px 6px rgba(0, 0, 0, 0.35));
        }
        
        /* Floor shadow flat on map under the toy auto */
        .auto-marker-badge::before {
            content: '';
            position: absolute;
            bottom: -6px;
            left: 8px;
            width: 32px;
            height: 8px;
            background: rgba(0, 0, 0, 0.55);
            border-radius: 50%;
            filter: blur(2px);
            z-index: -1;
            pointer-events: none;
            transition: transform 0.3s ease, opacity 0.3s ease;
            animation: shadowShrink 2.4s infinite ease-in-out;
        }
        
        /* Hover: lift higher, scale up, tilt slightly, shrink floor shadow */
        .auto-marker-badge:hover {
            animation-play-state: paused;
            transform: rotateX(10deg) translateY(-20px) scale(1.15);
            box-shadow: none;
        }
        
        .auto-marker-badge:hover::before {
            animation-play-state: paused;
            transform: scale(0.6);
            opacity: 0.2;
        }
        
        /* Bobbing float animation */
        @keyframes bobFloat {
            0%, 100% {
                transform: rotateX(20deg) translateY(-10px);
            }
            50% {
                transform: rotateX(20deg) translateY(-18px);
            }
        }
        
        /* Floor shadow shrink/fade synced with float height */
        @keyframes shadowShrink {
            0%, 100% {
                transform: scale(1);
                opacity: 0.55;
            }
            50% {
                transform: scale(0.65);
                opacity: 0.2;
            }
        }
    </style>
</head>
<body>

    <div id="map"></div>

    <div class="map-legend">
        <h4 class="legend-title">Demand Level</h4>
        <div class="legend-item">
            <span class="legend-dot" style="background:#00ff88"></span>
            <span>High (🟢)</span>
        </div>
        <div class="legend-item">
            <span class="legend-dot" style="background:#ffaa00"></span>
            <span>Medium (🟡)</span>
        </div>
        <div class="legend-item">
            <span class="legend-dot" style="background:#ff4444"></span>
            <span>Low (🔴)</span>
        </div>
    </div>

    <!-- Leaflet.js Script -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
            integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
            crossorigin=""></script>
            
    <script>
        // ── Constants ───────────────────────────────────────────
        const CHENNAI_CENTER = [13.0827, 80.2707];
        const DEFAULT_ZOOM   = 12;
        
        const DEMAND_COLORS = {
            High:   '#00ff88',
            Medium: '#ffaa00',
            Low:    '#ff4444'
        };
        
        const DEMAND_FILL_OPACITY = {
            High:   0.35,
            Medium: 0.3,
            Low:    0.25
        };

        // Initialize Map
        const map = L.map('map', {
            zoomControl: false,
            attributionControl: false
        }).setView(CHENNAI_CENTER, DEFAULT_ZOOM);
        
        // Add zoom control at top right
        L.control.zoom({ position: 'topright' }).addTo(map);

        // Add Dark Matter CartoDB tiles
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
            maxZoom: 19
        }).addTo(map);

        const markersLayer = L.layerGroup().addTo(map);

        // Base64 auto toy image string placeholder
        const autoToyBase64 = "/* AUTO_TOY_BASE64_PLACEHOLDER */";

        // Zone list predictions placeholder injected by Python
        const zones = /* ZONES_JSON_PLACEHOLDER */;

        // Popup Builder helper
        function buildPopup(zone) {
            const badgeClass = zone.demand_level.toLowerCase();
            return `
                <div class="popup-header">
                    <h3 class="popup-title">${zone.name}</h3>
                    <p class="popup-subtitle">${zone.description || 'Zone Area'}</p>
                </div>
                <div class="popup-body">
                    <div class="popup-row">
                        <span class="popup-label">Demand Level:</span>
                        <span class="badge-demand ${badgeClass}">${zone.demand_level}</span>
                    </div>
                    <div class="popup-row">
                        <span class="popup-label">Demand Score:</span>
                        <span class="popup-value" style="color: ${DEMAND_COLORS[zone.demand_level]}">${Math.round(zone.demand_score)}%</span>
                    </div>
                    <div class="popup-row">
                        <span class="popup-label">Nearby POIs:</span>
                        <span class="popup-value">${zone.nearby_pois || 3}</span>
                    </div>
                </div>
            `;
        }

        // Draw Markers
        function renderMarkers(zoneData) {
            markersLayer.clearLayers();
            if (!zoneData || zoneData.length === 0) return;

            const bounds = [];

            zoneData.forEach(zone => {
                const lat = zone.lat || zone.latitude;
                const lng = zone.lng || zone.longitude;
                if (lat == null || lng == null) return;

                const latlng = [lat, lng];
                bounds.push(latlng);

                const color = DEMAND_COLORS[zone.demand_level] || '#8888aa';
                const score = typeof zone.demand_score === 'number' ? zone.demand_score : 50;
                const radius = Math.max(300, score * 8);

                // Draw demand level circle
                const circle = L.circleMarker(latlng, {
                    radius:      Math.max(8, score / 5),
                    color:       color,
                    weight:      2,
                    opacity:     0.9,
                    fillColor:   color,
                    fillOpacity: DEMAND_FILL_OPACITY[zone.demand_level] || 0.3
                });

                circle.bindPopup(buildPopup(zone), { maxWidth: 240, closeButton: true });
                markersLayer.addLayer(circle);

                // For high-demand zones, add translucent circle glow and 3D auto toy!
                if (zone.demand_level === 'High') {
                    const glow = L.circle(latlng, {
                        radius:      radius,
                        color:       color,
                        weight:      0,
                        fillColor:   color,
                        fillOpacity: 0.08
                    });
                    markersLayer.addLayer(glow);

                    // Add 3D auto toy marker badge
                    const customIcon = L.divIcon({
                        html: `<div class="auto-marker-badge animate-marker-pulse">
                            <img src="${autoToyBase64}" alt="3D Auto Toy" />
                        </div>`,
                        className: 'auto-div-marker',
                        iconSize: [48, 48],
                        iconAnchor: [24, 24]
                    });

                    const autoMarker = L.marker(latlng, { icon: customIcon });
                    autoMarker.bindPopup(buildPopup(zone), { maxWidth: 240, closeButton: true });
                    markersLayer.addLayer(autoMarker);
                }
            });

            if (bounds.length > 0) {
                map.fitBounds(bounds, { padding: [50, 50], maxZoom: 14 });
            }
        }

        // Run marker drawing
        renderMarkers(zones);

    </script>
</body>
</html>
